{% extends "base.html" %}
{% block title %}Nuevo Cliente — La Sastrería{% endblock %}
{% block topbar_title %}Registrar Nuevo Cliente{% endblock %}
{% block content %}
<div style="max-width:700px">
<form method="POST">
  <div class="card">
    <div class="card-title" style="margin-bottom:20px">👤 Datos del Cliente</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nombre Completo <span class="req">*</span></label>
        <input type="text" name="nombre" class="form-control" required autofocus placeholder="Juan Pérez">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control" placeholder="5555-5555">
      </div>
      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" name="correo" class="form-control" placeholder="correo@ejemplo.com">
        <div class="form-hint">Para envío automático de resúmenes</div>
      </div>
      <div class="form-group">
        <label class="form-label">NIT</label>
        <input type="text" name="nit" class="form-control" placeholder="CF o número">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Dirección</label>
      <input type="text" name="direccion" class="form-control" placeholder="Dirección del cliente (opcional)">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea name="notas" class="form-control" rows="3" placeholder="Referencias, notas sobre el cliente..."></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">💾 Guardar Cliente</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </div>
</form>
</div>
{% endblock %}
